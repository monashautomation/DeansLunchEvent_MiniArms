<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MiniArms Control Panel — Monash Automation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 32px 16px;
  }

  .page-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #2c84f9;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* Screen bezel */
  .bezel {
    background: #111118;
    border: 2px solid #1e1e2e;
    border-radius: 16px;
    padding: 12px;
    box-shadow:
      0 0 0 1px #016ccc22,
      0 40px 80px rgba(0,0,0,0.8),
      inset 0 1px 0 #ffffff08;
    width: 100%;
    max-width: 820px;
  }

  /* Screen surface */
  .screen {
    background: #020817;
    border-radius: 8px;
    width: 100%;
    aspect-ratio: 800 / 480;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid texture */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(1,108,204,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(1,108,204,0.03) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top bar */
  .topbar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    border-bottom: 1px solid #016ccc18;
    background: rgba(2,8,23,0.9);
    backdrop-filter: blur(4px);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-logo {
    height: 20px;
    opacity: 0.95;
  }

  .topbar-divider {
    width: 1px;
    height: 16px;
    background: #016ccc30;
  }

  .topbar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: #4491f7;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(1,108,204,0.08);
    border: 1px solid #016ccc25;
    border-radius: 20px;
    padding: 3px 10px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #59e9cb;
    box-shadow: 0 0 6px #59e9cb;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: #59e9cb;
    letter-spacing: 1px;
  }

  /* Main layout */
  .main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    gap: 0;
    padding: 14px 16px;
    gap: 14px;
  }

  /* Left: action grid */
  .action-grid {
    flex: 1.5;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
  }

  .action-btn {
    background: #020817;
    border: 1px solid #016ccc28;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.15s ease;
  }

  .action-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #016ccc40, transparent);
  }

  .action-btn:hover {
    border-color: #016ccc60;
    background: #01111f;
  }

  .action-btn:active {
    background: #011828;
    border-color: #016ccc;
  }

  .btn-icon {
    font-size: 22px;
    color: #4491f7;
    line-height: 1;
    font-weight: 300;
  }

  .btn-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7.5px;
    color: #4491f7;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .btn-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 6px;
    color: #2c84f966;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Corner accent */
  .action-btn .corner {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 12px;
    height: 12px;
    border-right: 1px solid #016ccc30;
    border-bottom: 1px solid #016ccc30;
  }

  /* Divider */
  .panel-divider {
    width: 1px;
    background: linear-gradient(to bottom, transparent, #016ccc20 30%, #016ccc20 70%, transparent);
    margin: 8px 0;
    flex-shrink: 0;
  }

  /* Right: gripper panel */
  .gripper-panel {
    flex: 0.9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    gap: 10px;
  }

  .gripper-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    color: #4491f766;
    letter-spacing: 3px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  /* Gripper state display */
  .gripper-state {
    flex: 1;
    width: 100%;
    background: #020817;
    border: 1px solid #016ccc20;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .gripper-state::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 60%, #016ccc08 0%, transparent 70%);
  }

  .gripper-diagram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .gripper-finger {
    width: 6px;
    height: 32px;
    background: #016ccc;
    border-radius: 3px;
    opacity: 0.7;
  }

  .gripper-finger.left { transform: rotate(-8deg); }
  .gripper-finger.right { transform: rotate(8deg); }

  .gripper-gap {
    width: 12px;
    height: 20px;
    border-top: 1px solid #016ccc60;
    border-bottom: 1px solid #016ccc60;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gripper-state-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #59e9cb;
    position: relative;
    z-index: 1;
  }

  /* Toggle button */
  .toggle-btn {
    width: 100%;
    background: #020817;
    border: 1px solid #016ccc45;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .toggle-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #016ccc70, transparent);
  }

  .toggle-main {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #2c84f9;
    text-transform: uppercase;
  }

  .toggle-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    letter-spacing: 2px;
    color: #016ccc60;
    text-transform: uppercase;
  }

  /* Bottom bar */
  .bottombar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 18px;
    border-top: 1px solid #016ccc12;
    background: rgba(2,8,23,0.95);
  }

  .bottombar-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    color: #016ccc35;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .mac-addr {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    color: #016ccc30;
    letter-spacing: 1px;
  }

  /* Approval section */
  .approval {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .approve-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 24px;
    border-radius: 6px;
    border: 1px solid #016ccc;
    background: transparent;
    color: #4491f7;
    cursor: pointer;
    transition: all 0.15s;
  }
  .approve-btn:hover { background: #016ccc15; }
  .approve-btn.primary { background: #016ccc; color: #fff; }
  .approve-btn.primary:hover { background: #0180f0; }

  .approval-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #ffffff30;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="page-label">Control Panel Mockup · 800×480 · LVGL v8</div>

<div class="bezel">
  <div class="screen">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <img class="topbar-logo"
          src="https://monashautomation.com/assets/Horizontal_White_Blue_P3UbTX49SW96-YNq6qfEy.png"
          alt="Monash Automation"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span style="display:none; font-family:'IBM Plex Mono',monospace; font-size:10px; color:#4491f7; letter-spacing:2px;">MONASH AUTOMATION</span>
        <div class="topbar-divider"></div>
        <span class="topbar-title">Mini Arms</span>
      </div>
      <div class="topbar-right">
        <div class="status-pill">
          <div class="status-dot"></div>
          <span class="status-text">ESP-NOW LINKED</span>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main">

      <!-- 2×2 action button grid -->
      <div class="action-grid">

        <div class="action-btn">
          <div class="btn-icon">↑</div>
          <div class="btn-label">Action 1</div>
          <div class="corner"></div>
        </div>

        <div class="action-btn">
          <div class="btn-icon">↓</div>
          <div class="btn-label">Action 2</div>
          <div class="corner"></div>
        </div>

        <div class="action-btn">
          <div class="btn-icon">↺</div>
          <div class="btn-label">Action 3</div>
          <div class="corner"></div>
        </div>

        <div class="action-btn">
          <div class="btn-icon">↻</div>
          <div class="btn-label">Action 4</div>
          <div class="corner"></div>
        </div>

      </div>

      <div class="panel-divider"></div>

      <!-- Gripper panel -->
      <div class="gripper-panel">

        <div class="gripper-label">Gripper</div>

        <div class="gripper-state">
          <div class="gripper-diagram">
            <div class="gripper-finger left"></div>
            <div class="gripper-gap"></div>
            <div class="gripper-finger right"></div>
          </div>
          <div class="gripper-state-text">CLOSED</div>
        </div>

        <div class="toggle-btn">
          <div class="toggle-main">Toggle</div>
          <div class="toggle-sub">Gripper</div>
        </div>

      </div>

    </div>

    <!-- Bottom bar -->
    <div class="bottombar">
      <span class="bottombar-text">Dean's Lunch Event · 2025</span>
      <span class="mac-addr">70:4B:CA:26:DB:3C</span>
    </div>

  </div>
</div>

<div class="approval">
  <span class="approval-hint">Does this look right? Respond in the terminal.</span>
</div>

<script>
// Inject helper script compatibility
if (typeof toggleSelect === 'undefined') {
  window.toggleSelect = function(el) {
    el.classList.toggle('selected');
  };
}
</script>
</body>
</html>
